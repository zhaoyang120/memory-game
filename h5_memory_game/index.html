<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>极限工作记忆 - 30秒挑战你的脑力极限</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">

    <!-- ==================== 首页 ==================== -->
    <div id="page-home" class="page active">
      <div class="container">
        <div class="user-card">
          <div class="avatar" id="avatar-text">🧠</div>
          <div class="user-info">
            <div class="nickname">脑力挑战者</div>
            <div class="title-tag" id="home-title-tag">称号：过目小萌新</div>
          </div>
        </div>

        <div class="game-intro">
          <div class="main-title">极限工作记忆</div>
          <div class="sub-title">30秒挑战你的脑力极限</div>
        </div>

        <div class="stat-card">
          <div class="stat-item">
            <div class="stat-num" id="home-max-stage">0</div>
            <div class="stat-label">历史最高通关</div>
          </div>
          <div class="stat-item">
            <div class="stat-num" id="home-title-count">1</div>
            <div class="stat-label">已解锁称号</div>
          </div>
          <div class="stat-item">
            <div class="stat-num" id="home-total-correct">0</div>
            <div class="stat-label">累计答对</div>
          </div>
        </div>

        <button class="btn-primary" id="btn-start">开始挑战</button>
        <div class="difficulty-hint">第 1 关 · 3 道题 · 约 80 字短文</div>
      </div>
    </div>

    <!-- ==================== 记忆页 ==================== -->
    <div id="page-memory" class="page">
      <div class="container">
        <div class="header-bar">
          <div class="stage-num" id="memory-stage">第 1 关</div>
          <div class="timer-box" id="timer-box">
            <svg class="timer-ring" viewBox="0 0 100 100">
              <circle class="timer-ring-bg" cx="50" cy="50" r="42"></circle>
              <circle class="timer-ring-progress" cx="50" cy="50" r="42" id="timer-circle"></circle>
            </svg>
            <span class="timer-text" id="timer-text">30s</span>
          </div>
        </div>

        <div class="story-card">
          <div class="story-title">请在 <strong>30 秒</strong> 内记住以下内容</div>
          <div class="story-content" id="story-text"></div>
        </div>

        <button class="btn-primary" id="btn-finish-early">记好了，直接答题</button>
        <div class="hint-text">时间到将自动进入答题</div>
      </div>
    </div>

    <!-- ==================== 答题页 ==================== -->
    <div id="page-quiz" class="page">
      <div class="container">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-label" id="progress-label">1 / 3</div>

        <div class="question-card">
          <div class="question-text" id="question-text"></div>
        </div>

        <div class="options-container" id="options-container"></div>
      </div>
    </div>

    <!-- ==================== 结算页 ==================== -->
    <div id="page-result" class="page">
      <div class="container">
        <div class="result-header">
          <div class="result-icon" id="result-icon">🎉</div>
          <div class="result-title" id="result-title">挑战完成</div>
          <div class="result-score" id="result-score"></div>
          <div class="new-title-badge" id="new-title-badge" style="display:none;"></div>
        </div>

        <div class="promo-card">
          <div class="promo-title">🎁 参与有礼</div>
          <div class="promo-subtitle">联系助理获取 5 元商城现金券</div>
          <img class="qr-code" src="images/qr_code.png" alt="联系助理二维码" onerror="this.style.display='none';this.nextElementSibling.style.display='block';">
          <div class="qr-placeholder" style="display:none;">
            <div style="font-size:80rpx; opacity:0.3;">📱</div>
            <div style="color:#999;margin-top:8px;">请将二维码放入 images/qr_code.png</div>
          </div>
          <div class="promo-tips">长按识别或截图保存二维码</div>
        </div>

        <button class="btn-primary" id="btn-next">进入下一关</button>
        <button class="btn-secondary" id="btn-retry">再次挑战</button>
        <button class="btn-outline" id="btn-share">📤 分享给朋友</button>
        <button class="btn-text" id="btn-home">返回首页</button>
      </div>
    </div>

    <!-- ==================== 分享引导浮层 ==================== -->
    <div id="share-overlay" class="share-overlay" style="display:none;">
      <div class="share-arrow"></div>
      <div class="share-text">点击右上角 ⋯<br>分享给朋友</div>
    </div>

  </div>

  <script src="js/quizBank.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
